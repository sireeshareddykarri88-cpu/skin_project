<!DOCTYPE html>
<html>
<head>
<title>My Profile</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f5f7fa;
padding:20px;
}

.card{
max-width:400px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
text-align:center;
}

.avatar{
width:100px;
height:100px;
border-radius:50%;
background:#4facfe;
color:white;
font-size:40px;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
}

h2{
margin-top:15px;
}

.info{
margin-top:20px;
text-align:left;
}

.info p{
padding:10px;
background:#f2f2f2;
border-radius:10px;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
border:none;
background:#4facfe;
color:white;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<div class="avatar">
👤
</div>

<h2>{{ name }}</h2>

<div class="info">

<p><b>Email:</b> {{ email }}</p>

<p><b>Mobile:</b> {{ mobile }}</p>

</div>

<a href="/">
<button>
Back To Home
</button>
</a>

</div>

</body>
</html>
