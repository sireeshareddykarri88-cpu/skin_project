<!DOCTYPE html>
<html>
<head>
<title>Our Doctors</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial,sans-serif;
background:#f4f7fc;
margin:0;
}

.header{
background:#0077ff;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:20px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
background:white;
width:300px;
border-radius:20px;
padding:20px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.avatar{
font-size:70px;
}

.name{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.speciality{
color:#0077ff;
font-weight:bold;
margin:10px 0;
}

.exp{
color:#666;
}

.btn{
margin-top:15px;
padding:12px 25px;
border:none;
background:#0077ff;
color:white;
border-radius:30px;
cursor:pointer;
}

.btn:hover{
background:#0056cc;
}

</style>

</head>

<body>

<div class="header">
<h1>👨‍⚕️ Our Dermatologists</h1>
</div>

<div class="container">

<div class="card">
<div class="avatar">👩‍⚕️</div>
<div class="name">Dr. Priya Sharma</div>
<div class="speciality">Dermatologist</div>
<div class="exp">10 Years Experience</div>
<a href="/appointment">
<button class="btn">Book Appointment</button>
</a>
</div>

<div class="card">
<div class="avatar">👨‍⚕️</div>
<div class="name">Dr. Rahul Verma</div>
<div class="speciality">Skin Specialist</div>
<div class="exp">8 Years Experience</div>
<a href="/appointment">
<button class="btn">Book Appointment</button>
</a>
</div>

<div class="card">
<div class="avatar">👩‍⚕️</div>
<div class="name">Dr. Anjali Reddy</div>
<div class="speciality">Cosmetic Dermatologist</div>
<div class="exp">12 Years Experience</div>
<a href="/appointment">
<button class="btn">Book Appointment</button>
</a>

</div>

</div>

</body>
</html>
</html>
