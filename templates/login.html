<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#4facfe,#00f2fe);
font-family:Arial;
}

.box{
background:white;
padding:30px;
width:350px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:10px;
}

button{
width:100%;
padding:12px;
background:#4facfe;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>🔐 Login</h2>

<form action="/login_user" method="POST">

<input type="email"
name="email"
placeholder="Email"
required>

<input type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

</div>

</body>
</html>
