<!DOCTYPE html>
<html>
<head>
<title>Sign Up</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
background:white;
padding:30px;
border-radius:20px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:10px;
}

button{
width:100%;
padding:12px;
background:#4facfe;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2196f3;
}

</style>

</head>

<body>

<div class="container">

<h1>🩺 Sign Up</h1>

<form action="/register" method="POST">

<input type="text" name="name" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="text" name="mobile" placeholder="Mobile Number" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">
Create Account
</button>

</form>

</div>

</body>
</html>
